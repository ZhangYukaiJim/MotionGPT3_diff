NAME: MoT_vae_stage4_motionfix_eval_smoke
ACCELERATOR: 'gpu'
NUM_NODES: 1
DEVICE: [0]
DEBUG: false
FULL_CONFIG: true
VIS_NUM: 0

lm_ablation:
  motion_holder_repeat: 4
  holder_num_in_input: 4
  motion_holder_seq_mode: 'withse'
  with_hid_norm: False
  with_vae_latent_norm: True
  multi_hidden: True
  guidance_scale: 7.5
  model_guidance_scale: 7.5
  diffusion_batch_mul: 4
  guidance_uncondp: 0.1
  predict_epsilon: True
  fake_latent_mode: 'learnable_zero'
  mot_factor: 1.0
  attention_mode: 'all'

ABLATION:
  SKIP_CONNECT: True
  PE_TYPE: mld
  DIFF_PE_TYPE: mld

TRAIN:
  STAGE: lm_finetune
  instruction_type: witht2t
  NUM_WORKERS: 0
  BATCH_SIZE: 2
  END_EPOCH: 300
  PRETRAINED: checkpoints/motiongpt3.ckpt
  PRETRAINED_VAE: checkpoints/1222_mld_humanml3d_FID041.ckpt

  LR_SCHEDULER:
    target: CosineAnnealingLR
    params:
      T_max: 100
      eta_min: 1e-6

  OPTIM:
    target: AdamW
    params:
      lr: 1e-5
      betas: [0.9, 0.99]
      weight_decay: 0.0
    params_diff:
      lr: 1e-5
      betas: [0.9, 0.99]
      weight_decay: 0.0

EVAL:
  BATCH_SIZE: 2
  NUM_WORKERS: 0
  SPLIT: val

TEST:
  CHECKPOINTS: checkpoints/motiongpt3.ckpt
  SPLIT: test
  BATCH_SIZE: 2
  NUM_WORKERS: 0
  REPLICATION_TIMES: 1
  SAVE_PREDICTIONS: false

DATASET:
  target: motGPT.data.MotionFix.MotionFixDataModule
  CODE_PATH: TOKENS
  MOTIONFIX_CACHE_ROOT: /opt/data/motionfix-dataset/mgpt_humanml_cache_overfit
  TASK_ROOT: deps/mGPT_instructions
  TASK_PATH: ''
  NFEATS: 263
  MOTIONFIX:
    MAX_MOTION_LEN: 200
    MIN_MOTION_LEN: 20
    MAX_TEXT_LEN: 40
    PICK_ONE_TEXT: true
    FRAME_RATE: 20.0
    UNIT_LEN: 4
    FPS: 20
    ROOT: /opt/data/motionfix-dataset
    CACHE_ROOT: /opt/data/motionfix-dataset/mgpt_humanml_cache
  WORD_VERTILIZER_PATH: deps/t2m/glove/

METRIC:
  TYPE: [M2TDiffMetrics]
  M2T_DIFF:
    INCLUDE_BERT_F1: false
    INCLUDE_BLEU: true

LOSS:
  LAMBDA_FEATURE: 1.0
  LAMBDA_VELOCITY: 0.5
  LAMBDA_COMMIT: 0.02
  LAMBDA_CLS: 1.0
  LAMBDA_DIFF: 0.5
  ABLATION:
    RECONS_LOSS: 'l1_smooth'

model:
  target: motGPT.models.motgpt.MotGPT
  params:
    condition: 'text'
    task: 'm2t_diff'
    lm: ${lm.mot_vae_gpt2}
    motion_vae: ${vae.mldvae}
    mot_factor: 1.0
    attention_mode: 'all'
    guidance_scale: ${lm_ablation.model_guidance_scale}
    with_vae_latent_norm: ${lm_ablation.with_vae_latent_norm}
  diff_loss: ${lm.diffloss}

LOGGER:
  TYPE: []
  VAL_EVERY_STEPS: 1
  WANDB:
    params:
      tags: ['motionfix', 'stage4', 'm2t-diff', 'eval-smoke']
      project: motiongpt3

TRAINER:
  num_sanity_val_steps: 0
  enable_checkpointing: false
  log_every_n_steps: 1

lm:
  mot_vae_gpt2:
    target: motGPT.archs.motgpt_lm.MLM
    params:
      model_type: gpt2
      model_path: deps/mot-gpt2
      stage: ${TRAIN.STAGE}
      motion_codebook_size: ${model.params.codebook_size}
      mot_factor: ${lm_ablation.mot_factor}
      attention_mode: ${lm_ablation.attention_mode}
      ablation: ${ABLATION}
      diffhead: ${model.diff_loss}
      diffusion_batch_mul: ${lm_ablation.diffusion_batch_mul}
      guidance_uncondp: ${lm_ablation.guidance_uncondp}
      predict_epsilon: ${lm_ablation.predict_epsilon}
      guidance_scale: ${lm_ablation.guidance_scale}
      fake_latent_mode: ${lm_ablation.fake_latent_mode}
      motion_holder_repeat: ${lm_ablation.motion_holder_repeat}
      holder_num_in_input: ${lm_ablation.holder_num_in_input}
      motion_holder_seq_mode: ${lm_ablation.motion_holder_seq_mode}
      with_hid_norm: ${lm_ablation.with_hid_norm}
      with_vae_latent_norm: ${lm_ablation.with_vae_latent_norm}
  diffloss:
    target: motGPT.diffusion.diffloss.DiffLoss
    params:
      width: 1024
      depth: 3
      multi_hidden: ${lm_ablation.multi_hidden}
      num_sampling_steps: '100'
      noise_schedule: scaled_linear
      learn_sigma: false
      sigma_small: true
      grad_checkpointing: false

vae:
  mldvae:
    target: motGPT.archs.mld_vae.MldVae
    params:
      arch: encoder_decoder
      ff_size: 1024
      num_layers: 9
      num_heads: 4
      dropout: 0.1
      normalize_before: false
      activation: gelu
      position_embedding: learned
      latent_dim: [1, 256]
      code_num: 512
      guidance_scale: 3.0
      guidance_uncondp: 0.1
      datatype: ${DATASET.target}
      nfeats: ${DATASET.NFEATS}
      ablation: ${ABLATION}

evaluator:
  tm2t:
    t2m_textencoder:
      target: motGPT.archs.tm2t_evaluator.TextEncoderBiGRUCo
      params:
        word_size: 300
        pos_size: 15
        hidden_size: 512
        output_size: 512
    t2m_moveencoder:
      target: motGPT.archs.tm2t_evaluator.MovementConvEncoder
      params:
        input_size: ${eval:${DATASET.NFEATS} - 4}
        hidden_size: 512
        output_size: 512
    t2m_motionencoder:
      target: motGPT.archs.tm2t_evaluator.MotionEncoderBiGRUCo
      params:
        input_size: ${evaluator.tm2t.t2m_moveencoder.params.output_size}
        hidden_size: 1024
        output_size: 512
  tmr:
    text_to_token_emb:
      target: motGPT.archs.tmr_text_encoder.TokenEmbeddings
      params:
        path: deps/tmr/annotations/humanml3d
        modelname: distilbert-base-uncased
        preload: true
    text_to_sent_emb:
      target: motGPT.archs.tmr_text_encoder.SentenceEmbeddings
      params:
        path: deps/tmr/annotations/humanml3d
        modelname: sentence-transformers/all-mpnet-base-v2
        preload: true
    tmr_motionencoder:
      target: motGPT.archs.tmr_evaluator.ACTORStyleEncoder
      params:
        nfeats: 263
        vae: true
        latent_dim: 256
        ff_size: 1024
        num_layers: 6
        num_heads: 4
        dropout: 0.1
        activation: gelu
    tmr_textencoder:
      target: motGPT.archs.tmr_evaluator.ACTORStyleEncoder
      params:
        nfeats: 768
        vae: true
        latent_dim: 256
        ff_size: 1024
        num_layers: 6
        num_heads: 4
        dropout: 0.1
        activation: gelu
    tmr_motiondecoder:
      target: motGPT.archs.tmr_evaluator.ACTORStyleDecoder
      params:
        nfeats: 263
        vae: true
        latent_dim: 256
        ff_size: 1024
        num_layers: 6
        num_heads: 4
        dropout: 0.1
        activation: gelu
